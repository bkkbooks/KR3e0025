body:
  text: 傷寒㣲㫖論卷下宋韓祗和撰總汗下篇凡治傷寒病若能辨其汗下者即治病之法得其十全矣今之醫者則不然但憑其熱論云未滿三日可汗而已其滿三日者可泄而已又云脈大浮數病為在表可發其汗脈細沈數病為在裏即可下之此古人立理之綱維而今人執之為定法又全不辨脈尺寸之陰陽邪氣之虚盛及内外證之輕重但未滿三日即投發表藥已滿四日即投下藥其間或有辨脈之浮沈投汗下藥者以為能事矣殊不知未滿三日亦有可下者已滿四日後亦有可汗者又不知脈浮有不可汗者脈沈有不可下者熱論云傷寒一日巨陽受之故頭項痛腰脊强二日陽明受之陽明主肉故身熱目疼而鼻乾不得卧三日少陽受之少陽主膽故胷脅痛而耳聾三陽經絡皆受其病未入于蔵故可汗而已四日太陰受之故腹滿而咽乾五日少陰受之故口燥舌乾而渇六日厥陰受之故煩滿而囊縮此三陰三陽受病之日乃是聖人立條目之法不必一日巨陽二日陽明為次也但會三陰三陽所直之日與邪氣相逢即各有形證也假令一日或耳聾或鼻乾或頭痛或腹滿或舌乾而渇或囊縮此是邪氣隨陰陽之經絡所𫝊也餘日倣此雖見此三陰三陽病證若兩手三部脈或浮或沈寸關尺力齊等者不得妄投發表藥及投下藥當侯兩手脈浮沈中或關前大關後小或關前小關後大此是陰陽氣之偏勝即依脈證投藥治之仲景傷寒論傷寒例云尺寸俱浮太陽受病也尺寸俱長陽明受病也尺寸俱弦少陽受病也尺寸俱沈細者太陰受病也尺寸俱沈者少陰受病也尺寸俱㣲緩者厥陰受病也此亦是因邪氣𫝊受三陽三陰之經故見此脈亦不可妄投發表藥及投下藥當候兩手脈浮沈中或關前力小關後力大或關前力大關後力小此亦是陰陽氣之偏勝即依脈證投藥治之且黄帝作三陽三陰證在前仲景述三陽三陰脈在後本為邪氣所𫝊故設此語非務求法治之恐後人悞投藥也今人纔見病人有此三陰三陽病證及脈便急投藥求愈則失之逺矣熱論云七日巨陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾㣲聞十日太陰病衰腹減如故則思飲食十一日少陰病衰渇止不滿舌乾已而嚏十二日厥隂病衰囊縱少腹㣲下大氣皆去病日已矣且傷寒病若見三陽三陰證及脈合用藥調治古人何言大氣皆去病日衰矣即知是不須用藥妄調治也仲景傷寒論辨太陽證云太陽病頭痛至七日以上自愈者以行其經盡故也又曰十二日厥陰病衰大氣皆去病人精神爽慧矣且素問經中黄帝與岐伯問荅病證莫知其數皆各立法治之惟熱論中傷寒病最為大疾却云七日太陽病衰又云大氣皆去若是傷寒病須用法調治即聖賢皆不言自愈也今之醫者纔見人病傷寒多不辨脈之理趣又不分證之是非便妄投藥以調治往往變成壞病至于横夭誠可傷也傷寒病稱可汗者非謂病人三日以前也葢謂邪氣在表或陰氣勝于陽氣即寸口脈力小于關尺令人惡風或自汗出即可投發表藥以助陽消陰若陽氣勝于陰氣即寸口脈力大于關尺令人發熱冒悶可投解表藥以助陰消陽非謂求汗出為愈若邪氣在表脈浮三部力齊等惡風不汗出不冒悶發熱又何必投發表及解表藥也傷寒病稱可下者非謂病人第四日以後也但見邪氣在裏伏于胃中或陽氣勝于陰氣即寸脈力大于關尺令人口燥咽乾腰重發熱甚至于譫語可投大黄等藥以助陰消陽若邪在裏陰氣勝于陽氣即寸脈力小于關尺令人胷滿悶或時嘔吐可投溫中藥以助陽消陰不可求取積為愈若邪氣在裏脈沈三部力齊等不譫語不口燥咽乾不胷腹滿悶又何必投藥下之及温中藥也世人為見素問云三日以前可汗四日以後可下乃執為定法今深戒醫流不可將病人三日以前妄投汗藥四日以後妄投下藥切宜慎守仲景曰發汗吐下之相反其禍至速信矣且古之聖賢立汗下二字本謂調解陰陽偏勝之氣而今醫者執汗下二字妄為主治傷寒求愈之功則失之逺矣况仲景治傷寒病未嘗有失汗下之戒失下之過但責其下之太早此仲景之心也後人或各擅家技或自持已能殊不究仲景心萬分之一誠可罪焉辨汗下藥力輕重篇凡醫者治傷寒病遇其邪氣在表並不分邪氣之輕重脈理之虚盛只憑脈浮便將發表藥一例投之務期汗多為快藥力過劑遂致衂血吐血發斑汗漏四肢拘攣因成亡陽之患也病人無汗發熱三部脈浮寸脈大于關尺者此是陽盛陽邪既盛若入于胃中即變成瘀熱之患當用解表藥以消陽氣解表藥者石膏甘草芍藥生薑豆豉薄荷柴胡葛根之類是也病人汗出惡風脈浮見陰盛者可投發表藥消陰氣發表藥者桂枝麻黄荆芥棗葱當歸附子乾薑之類是也但不可全用桂枝耳凡投發表藥只要消解陰勝之氣不務汗多為法若汗出太過則成亡陽之病仲景桂枝湯證云令遍身漐漐然㣲似有汗不可如水流漓令旣見可汗證當投發表藥古人何故却云汗不可如水流足知發表藥不謂汗多為愈也凡醫者治傷寒病遇其邪氣在裏並不分邪氣之輕重脈理之虚盛只憑脈沈便將下藥一例投之務期大便快利為法既過劑遂成噫噦嘔吐四肢逆冷及拘攣之患病人發熱冒悶或譫語脈見陽盛者可投下藥以消陽氣陽氣既消則無忽變之證消陽藥者大黄芒硝梔子甘草枳實之類是也如用大黄芒硝須用少兼厚朴以和之若一服未中再服之不可務期快利切宜慎守也凡投下藥只要消陽毒之氣不務取積為快今既見可下證古人何故却罪下之太早及太過足知不務快利為法也今立此篇校量藥力輕重者葢謂醫流執守古方不能隨形證淺深増減藥味也若能辨藥輕重隨證用藥何慮太過不及之責也葛氏肘後篇曰傷寒有數種初覺作葱䜴湯頓服取汗如不汗加葛根升麻更加作麻黄豉湯以此校之即古人豈一端而治病故其輕重出此篇以明之温中篇夫傷寒病之說始黄帝以開其端由至于仲景方陳其條目自後膚淺之學莫知其數立言者只云病在表可發汗病在裏可下之或云不可汗或云不可下未嘗有溫中之說仲景傷寒論云尺寸俱沈細太陰受病也尺寸俱沈少陰受病也尺寸俱㣲緩厥陰受病也又辨太陰證云病脈浮可發汗宜桂枝湯又自利不渇宜四逆湯又腹滿時痛桂枝加芍藥湯辨少陰證云少陰病始得之發熱脈沈麻黄附子細辛湯少陰證二三日麻黄附子甘草湯又少陰病身體痛手足寒骨節痛脈沈附子湯又少陰病吐利手足逆冷煩躁欲死吳茱茰湯又少隂病脈沈急温之宜四逆湯今舉仲景論中數條最是治三陰病之良法于今世之用尚有未盡證者愚嘗校讐自至和初嵗迄于今三十餘年不以嵗之太過不及每夏至前以有病傷寒人十中八七兩手脈俱沈細數多是胷臆滿悶或嘔吐或氣塞或腹鳴或腹痛與仲景三陰病之說脈理同而證不同因不敢妄投仲景治三陰病藥醫者才見脈沈及胷膈滿便投藥下之往往不救嘗斟酌仲景理中丸與服之其病勢輕者即胷中便快其病勢重者半日許悶依然或有病人脈沈細遲投仲景四逆湯温之多藥力太熱後必發煩躁因校量此形證今别立方以治之多得對病不可不𫝊焉按王好古陰證畧例云此一條非四逆熱而不當也仲景當漢末韓氏當宋隆時勢異也病人但兩手脈細數或有力或無力或關脈短及小者胷中膈塞悶氣不能相接者便可隨證與脈投温中藥以治之按王好古云此一條法甚活病人兩手脈沈遲或緩或𦂳皆是胃中寒也若寸脈短及力小于關尺脈者此是陰盛陽虚也或胷膈滿悶腹中脹痛身體俱急手足逆冷急宜溫之若立春以後至清明以前宜溫中湯主之清明以後至芒種以前宜橘皮湯主之芒種以後至立秋以前宜七物理中丸主之温中湯舶上丁香皮厚朴各一兩乾薑白术丁香枝陳皮各二分右為末每服二錢水一盞入葱白三寸荆芥五穂煎至七分去滓熱服如三服未快及手足逆冷嘔吐更加舶上丁香皮二分乾薑一分炮橘皮湯陳皮厚朴各一兩藿香三分白术葛根各二分右為末每服二錢水一盞入薑一塊如棗大劈破同煎至七分去滓熱服如三兩服後未快手足逆冷嘔吐不止加半夏三分丁香枝半兩葱白三寸同煎服七物理中丸人參三分生薑屑二兩藿香三分白术二兩桔梗三分葛根三分右為細末煉蜜丸如彈子大每服一丸水一盞煎至七分和滓熱服如兩三服後未快及手足逆冷嘔吐加半夏二分乾薑二分炮病人兩手脈沈細無力雖三部脈力停亦是陰氣盛也更不須候寸脈短治之或胷膈痛身體拘急疼痛手足逆冷宜用溫中藥和之按王好古云此條不須候寸脈短一句難解當云三部旣沉便是無寸口也若立春以後至清明以前宜厚朴湯主之清明以後至芒種以前宜白术湯主之芒種以後至立秋以前宜橘葉湯主之按王好古陰證畧例云此一條李思訓舉和觧因時一說與韓氏相似然湯液仲景四時之法固已備矣以其後人不識故韓李為是丁寧也此亦大槩耳若應見違時只可隨應見而治之海蔵云仲景既言春為温病夏為熱病長夏為大熱病隨經之藥加減輕重便為因時和觧也至治應見便是活法韓李因時定葯是則然矣證復違時定藥難用若用定藥却是不因時也假令立春清明芒種立秋即嵗之主氣也定時也若嵗之客氣司天在泉太過不及勝復淫至而不至未至而至豈可定時為則邪主氣為病則只論主氣客氣為病則只論客氣主氣相勝上下相召有萬不同之變人之稟受虚實亦猶是也以此言之則仲景六經之言盡矣但患時氣醫者不知耳此亞聖言簡而意有餘也後之賢者辭多而意少務救一時之弊此韓李為是因時一說也是說也又為庸醫執方療病者設非敢為仲景别立一法也噫二公雖不足為漢之仲景亦足以為今之仲景也厚朴湯當歸厚朴甘草丁香枝乾薑各半兩細辛一分人參三分右為末煉蜜丸如彈子大每服一丸水一盞煎至七分和滓熱服如三五服後脈尚細及寸脈未有力加葱白三寸同煎按王好古陰證畧例云此一條言寸脈小者陽不及九天也加葱以通經白术湯白术半夏當歸厚朴生薑屑各半兩舶上丁香皮三分右為末每服二錢水一盞入生薑一塊如棗大劈破同煎至七分去滓熱服如三五服後未有力及寸脈力尚小加細辛半兩葱白三寸同煎服橘葉湯橘葉半夏厚朴各半兩藿香葛根二味分兩原脫右為末每服三錢水一盞生薑一塊如棗大劈破同煎至七分去滓熱服如三五服後脈尚力小手足逆冷加細辛三分病人胷膈滿悶時時嘔逆支節疼兩脇下痛腹中鳴此是停飲宜二苓湯主之二苓湯赤苓豬苓白术桂枝各半兩滑石一兩白豆仁通草各一分丁香皮三分陳皮三分右為末每服三錢水一盞煎至七分去滓熱服小便未快加瞿麥三分嘔未止加半夏半兩寒甚加葱白三寸按王好古云此與李思訓調小便例同病人八九日後服汗下藥太過兩手脈沈細而無力好踡足卧多惡明與人聲身有粟起時時發戰一如􅒻證宜羊肉湯主之羊肉湯當歸牡礪芍藥各一兩龍骨半兩桂枝去皮二分黑附子二箇每箇五錢重泡去皮臍右杵為麤末每服用末二兩羊膐肉四兩生薑二兩葱白五寸同剉爛以水五升同熬至二升半以來淨絞去滓分作三盞服病人服藥胷中滿者此是上焦有陽也或藥力太過上焦覺氣熱腹滿虚鳴時時㽲痛此是被陽藥消逐上焦陰氣併入下焦也雖是下焦積寒今上焦陽盛更難投溫下焦藥也當用炭灰或桑柴灰二三升許入好醋拌和乾濕得所于銚内炒令灰熱以帛包裹置臍下熨之頻换灰包常令熱以腹不痛為度或初用灰熨病人不肯受者勿聽但令極熨之勿住炭包如因炭包熨後得下利一兩行或小便二三升或㣲有汗此是陰氣外出或下泄也當勿疑之病輕者乃得瘥愈病人三部脈沈寸脈力小于關尺為陰盛當投溫中藥以消陰氣温中藥者厚朴橘皮人參白术藿香當歸乾薑細辛之類是也按王好古陰証略例云感霜露山嵐雨濕霧霿之氣而飲冷寸口脈小同診一法神术湯後舉此韓氏三部脈沈寸口小于關尺為證一體病人若因服下葯太過两手脈沉細數肢體逆冷煩躁而渇者此是陽氣下陷入丹田陰氣厥逆滿上二焦故令人躁此名陰躁也醫者見病人煩躁又不詢其端由亦不詳其脈理便用涼藥治之涼藥既下病勢愈甚至於困極不救者多矣病人因下之太過兩手脈沈遲細而無力或遍身及四肢逆冷煩躁而渇引飲不休好泥水中卧者須用性熱藥治之凡投性熱藥皆須冷服何故如是葢為病人腹中陰氣太盛若投熱藥湯劑即陰陽相爭葯下即吐須候湯劑極冷即投之投之不吐者以腹中陰氣與冷飲相逄即同氣相從爾故藥下不吐也藥雖冷久則必熱所謂始同而終異也故醇酒冷飲久即發熱假令投仲景四逆湯之類一依前說若病人不煩躁即熱藥亦可温服之若躁渇引飲不休雖傷冷只好冷飲同意氣此一條本是陽證下之成陰非陽氣上行而躁乃陽下陷而躁即同伏陽脈也叔和云短脈陰中有伏陽無海蔵云熱藥冷服内有伏陽則可若脈已虚按之全力或病人素無所養只可温服不然陰氣必不能醖釀囘陽利害非輕小便大便篇治傷寒病常調觧病人小便流利及色不黄赤最為醫之大要也病人二三日以後頻體問病人無令小便黄赤色及淋瀝才似小便少及黄色即據證便投藥以調治之切勿令凝滯也病人邪熱積於胃中又遇天氣炎盛内外熱氣相干併走于下焦流下入膀胱為熱所結即滲漉過遲故小便因而色黄赤及澀少也若熱氣盛則藥力愈難通也傷寒論曰熱結膀胱其人如狂病人小便色或變黄雖未赤澀便可投瞿麥湯每日二三服亦無害也凡治病傷寒常令放行小便勿令放行大便况小便難導也而大便易導也假令陽明病胃中熱實止不過調胃承氣湯投之藥既得下泄去熱毒之氣不為難也假令小便凝滯若證輕尚慮快藥之勿及况證重乎此乃傷寒要妙之門不可不思之况古人無失下之過無禁小便之法何今人不究其深趣也瞿麥湯治病人二三日以後至未大汗以前若小便黄色者瞿麥扁蓄豬苓黄芩茯苓各一兩木通兩半滑石三兩甘草三錢通草一錢右為末每服三錢水一盞同煎至八分去滓放溫涼時時服若覺渇或發熱加􅌝􅌣根一兩若小便赤色加黄芩半兩若小便少加車前子三分若小便澀如淋莖中痛者加石葦半兩冬葵子三分續隨子半兩若臍下悸動加茯苓桂枝各半兩並依前法服七物調中丸白术乾薑炮各一分人參一兩厚朴舶上丁香皮各半兩右杵為末煉蜜和丸如彈子大每服一丸水一盞棗二箇劈破煎至六分去滓早服六物瀉心湯黄連半夏各一兩甜葶藶炒杏仁乾薑各半兩栝蔞實剉如泥一枚右剉如豆大合一處分作六服水三盞煎至一盞半淨紐去滓放温作兩次相續服如半日胷中未快及未通利再投之再煎藥成傾在碗入芒硝末三錢攪匀去滓温服取其快利也茯苓陷胷湯茯苓黄連各一兩冬葵子續隨子各一分大黄杏仁各半兩半夏三分右剉如豆大合一處每服半兩水二盞煎至一盞淨紐去滓溫服如半日許未快利更投一服以胷中快及下利為度病人二三日兩脈沈數㣲濇寸脈不甚浮大胷腹滿悶按之不痛宜服厚朴瀉心湯厚朴瀉心湯半夏兩半黄連厚朴各一兩乾薑白术各二兩人參三分右剉如豆大分作八服每服水二盞半生薑二分切為片同煎至盞半去滓放温兩次服如半日許未得利再一服畜血證篇傷寒病有畜血證自仲景立法之後醫流未嘗有信其言者逮仁宗朝采仲景法以治傷寒其間遇病有畜血證用仲景法治之若與證相當即病無不愈病人或太陽或陽明證至六七日或表證未觧或狂或饑或喜或妄或不大便此乃瘀熱走於下焦因而畜成積血及令小腹滿也傷寒論云太陽病不觧熱結膀胱其人如狂宜桃仁承氣湯又論太陽病其人發狂者以熱在下焦小腹當鞕滿小便自利瘀熱在裏故也抵當湯主之太陽病身黄脈沈結少腹鞕小便自利其人如狂者血證諦也抵當湯主之又傷寒有熱小腹滿悶應小便不利今反利者為有血也宜抵當湯又陽明證其人喜忘者必有畜血屎雖鞕大便反易其色必黑宜抵當湯下之又病人無表裏證發熱至七八日熱則消穀善饑至六七日不大便者有瘀血宜抵當湯主之仲景立此數方治畜血而云小便自利乃血證諦也病人本因瘀熱結在膀胱即小便不利但血逢瘀熱淖溢而併走於下遂積聚於下焦血積既多陽氣乃極極則必反陽氣旣消陰乃來復血遇陰氣凝結如豚肝其血常冷膀胱為冷血所氷乃滲漉易過即小便自利也故仲景曰小便自利血證諦也病人有畜血證若現餘證而小便未利是陽氣尚盛而血未足也即未可便投湯丸治之候小便利乃可投藥凡治畜血證抵當湯丸方中皆用蝱蟲水蛭及桃仁之類盡是破血藥若非此藥則不能下之今之用者往往投之太過葢為不審其病之輕重與其人之老少强弱也如遇畜血證與仲景方對即可全用其法治之若病勢少輕人又老弱倣傚抵當湯丸别用破血藥治之亦可知此變通庶免後患熙寧五年壬子長安縣君李氏年六十餘自來瘦弱患傷寒病至第九日變成畜血來召及到胗之兩手脈沈遲細力㣲膚冷小腹滿昏迷不省人事再三詢其所由來其主病者云自得病後服發汗藥至第六日喜妄發狂至第八日身體冷臍下滿昏迷失次既得此言知為畜血證矣又問病人曾遺小便否曰病後小便常不利愚甚疑之因用紙針内其兩鼻中遂嚏數聲及令驗之小便已自利余謂向來小便不利者因其年老氣弱不能降下也若端坐候小便自利不以法驗之豈不後時也但血雖積聚日多若投仲景抵當湯丸慮藥勢太過血下之後尚有藥之餘力因而損壞臓腑變成血痢大為後患愚因别立地黄湯主之連投之其血大下次日乃愈元豐四年辛酉親戚孫氏姙娠第八月患傷寒至五六日熱極第七日墮胎不及半日惡露遂絶至中夜臍下滿喜妄譫語至次日兩手脈沈細數膚冷小便自利此畜血證具也但病人年少血氣充盛又因産畜血深慮仲景抵當湯力薄别處生漆湯令服三次共服藥一升半其血乃下痛遂愈今之醫者治畜血病依仲景方投抵當湯丸若病熱輕及病人年老氣弱其血大下之後病雖得愈往往下血不止何况太平之人五臓柔脆苦不任蝱蟲水蛭之藥非仲景藥之過也乃醫者不審其時代又不量病人之强弱也若叅酌其病能倣傚抵當湯丸方别立藥治之即免病人後患矣今人纔見畜血將謂不可調治即將抵當湯丸倍増而投之或連綿而投之畜血雖出而蝱蟲水蛭勢力未盡遂損壞腸胃日夕㽲痛下血不止至於不救者十中八九矣醫者既見病人下血云是蔵毒尚不知自己投藥太過之罪也又盛衰論篇云胗有十度形度脈度蔵度肉度筋度俞度陰陽氣血人病自具注云胗備盡陰陽虚盛之理則人病自知之又五常政大論篇云大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九無使過之傷其正也若醫者能叅酌藥力量病投之乃為良工矣病人七八日以後兩手脈沈遲細㣲膚冷臍下滿或喜或妄或狂躁大便實而色黑小便自利者此畜血證也若年老及年少氣虚弱者宜地黄湯主之地黄湯生地黄自然汁一升或末二兩重生藕自然汁如無用小薊汁半升再無用小薊末一兩蝱蟲二十箇去足翅麩炒黄桃仁半兩藍葉一握切令乾作末水蛭十箇麸炒乾漆半兩炒煙盡大黄一兩剉如骰子大右藥入水三升半慢火熬及二升以來放冷分三服投一服至半日許血未下再投之此比抵當丸力勢甚輕如無地黄與藕汁計升數添水同煎病人七八日後兩手脈沈細而數或關前脈力大臍下滿或狂走或喜妄或譫語者不大便小便自利若病人年少氣實血凝難下恐抵當湯丸力不能及之宜生漆湯主之生漆湯生地黄汁一升如無用三兩半大黄二兩剉犀角半兩桃仁三十箇右藥用水三升好酒一升慢火熬及三升以來傾出濾去滓再入鍋内㸃生光漆兩半再熬至二升即住火淨濾去滓放冷分作三服每投一服候半日許血未下再投一服候血下即止後服如無生地黄汁更添水一升同煎陰黄證篇傷寒病發黄者古今皆為陽證治之往往投大黄梔子蘖皮黄連茵陳之類亦未嘗得十全愚每於懷衞二郡其病傷寒人有黄證風俗相𫝊多以新汲水浴之其病有愈者有不愈者又於邢磁二郡間病傷寒人有黄證風俗相𫝊以熱湯浴之或以湯漬布搭其胷腹或以湯盛瓢中坐在臍下熨之其病亦有愈者有不愈者其醫流莫能知其不愈之故見此二端愚深惑之且黄病既為陽證何故以湯浴之既有得愈者豈不謂治黄病有證者乎嘗遍討諸醫書並無熱藥治黄病及無治陰黄法且仲景治傷寒論辨陽明病脈者傷寒發汗已身目為黄所以然者寒濕在裏不觧故也不可以下之於寒濕中求之仲景只云於寒濕中求之即不曽别立方藥後有傷寒類要治黄疸門中夫熱發黄已久變成桃花色心下有堅嘔逆不下飲食小便極赤少四肢逆冷脈深沈極㣲細遲者不宜服茵陳湯使下必變噦也宜與大茵陳湯除大黄與生地黄五兩服湯盡消息看脈小浮出形小見不甚沈㣲便可治也脈浮見者黄當明不復桃花色浮指下自覺也此類要中但只云脈浮大可治脈沈細不可治又於本卷治陰黄門中病源陰黄候陽氣伏陰氣盛熱毒加之故身面色黄頭疼而不發熱者名為陰黄也論中雖稱陽伏陰盛即可服茵陳散方内却用茵陳大黄梔子黄連紫雪之類亦皆寒藥却與本病相違且陰黄者乃心病也心火為濕所折即遍身發黄與傷寒黄病異矣傷寒病發黄本自脾弱水來凌犯又胃中空虚而變為黄是與陰黄不同耳病人始於二三日務求汗下為勝或服發汗温中藥太過加以厚衣葢覆仍於陰濕不通風處坐卧或以火刼之變為黄病此乃陽黄也當投寒藥以治之藥證仲景論中悉具病人三五日後服下藥太過虚其脾胃亡津液引水漿脾土為陰濕加之又與暑相㑹至第六七日變為黄病此乃陰黄也當投湯藥治之治法具在後說病人六七日兩手脈沈遲㣲細肢體逆冷皮有粟起時或嘔吐舌上白胎身發黄煩躁欲於泥水中卧小便赤少醫者見病人黄生更不審察脈理便投寒藥其病愈甚愚因是而别撰成治陰黄病證并方六七首凡十餘年不逢病陰黄者自疑無憑元豐二年己未六月中淦陽人趙宗顔病傷寒至六七日發黄來召及到胗之其脈沈細遲無力皮膚涼發躁欲於泥水中卧喘嘔小便澁再三問病人曰得非服下藥太過乎病人曰然予見此深喜之此乃陰黄也先投茵陳橘皮湯不及劑喘嘔止次日投小茵陳湯半劑脈㣲出不欲於泥水中卧次日又投茵陳附子湯半劑四肢發熱小便二三升當日中大汗元豐五年壬戌五月中淦陽趙塤秀才病傷寒亦是醫者投下藥太早又投觧利涼藥過劑至六七日轉發黄病至第七日來召及到胗之兩手寸脈不見關尺脈沈遲細㣲腹滿小便澁四肢遍身冷面如桃花一身盡黄先投茵陳茯苓湯半劑小便得利次服茵陳四逆湯脈出四肢熱目中黄先退次日大汗當年似此證者十餘人不能一一寫錄愚向日所思陰黄病處方六首初慮不能為用今既治數人皆得中病不可不𫝊焉傷寒病嘗校之每遇太陽或太陰司天嵗若下之太過往往變成陰黄何故如是葢因辰戌嵗太陽寒水司天寒化太過即水來犯土丑未嵗太陰濕土司天土氣不及即脾氣虚弱又水來凌犯多變斯證也醫者宜審察之茵陳茯苓湯治病人五六日脈沈細㣲身温四肢冷小便不利煩躁而渇者茯苓桂枝各一兩豬苓三分滑石兩半茵陳蒿二兩右為末水四升煮取二升去滓放温分作四服如脈未出加當歸半兩茵陳橘皮湯治病人脈沈細數身熱手足寒喘嘔煩躁不渇者橘皮生薑茵陳蒿各一兩白术一分半夏茯苓各半兩右為末水四升煮取二升去滓放温分為四服小茵陳湯治病人脈沈細遲四肢及遍身冷附子一箇破作八片甘草一兩茵陳蒿二兩右為末水二升煮取升半去滓放温分作三服茵陳四逆湯治病人脈沈細遲肢體逆冷腰以上自汗出甘草茵陳蒿各二兩乾薑兩半附子一箇破八片右為末水四升煮取二升去滓放温作四服茵陳附子湯治病人服茵陳四逆湯身冷汗出不止者附子二箇破八片乾薑茵陳蒿各兩半右為末水二升煮取升半去滓放温分作三服茵陳茱茰湯治病人附子湯證尚未退及脈伏者呉茱萸木通各一兩乾薑茵陳各兩半當歸三分附子二箇作八片右為末水四升煮取二升去滓放温分作四服勞復證篇傷寒病大汗後餘熱未盡或飲酒或食肉或喫熱食太過與熱毒相逢便成勞復之患熱論篇曰熱病巳愈時有所遺者何也歧伯曰諸遺者熱甚而强食故有所遺若此者皆病已衰而熱有所蔵因其穀氣相薄兩熱相合故有所遺也帝曰治遺奈何歧伯曰視其虚實調其逆從可使必已矣又歧伯曰病熱少愈食肉則復多食則遺此其禁也注云是所謂戒食勞也熱雖少愈猶未盡除脾胃氣虚未能消化内堅食駐故熱復生復謂復舊病也仲景傷寒論大病差後勞復者枳實梔子湯又傷寒差已後更發熱小柴胡湯主之脈浮以汗觧之脈沈實以下觧之又大病差後喜唾久而不了了胷上有寒當丸藥温之宜理中丸病人大病差後勞復者多是因熱所致即再成𫝊汗之疾其間有胃中寒者只可與温中藥即更不𫝊汗也温中藥者可用温中篇内七物理中丸或温中湯可也病人大病後勞復者纔三二日以後脈沈實若寸脈差大於關尺脈或寸關尺脈三部力停皆可下之况勞復病只有失下並無下之太早亦無下之太過何者葢胃中有瘀熱在也更與熱飲食相合若下之晩及下藥力少時雖得汗汗罷必成勞復至於三四發也病人二三日以後服下藥畢至第八九日未汗纔見有證即便宜下之不可候時也凡治勞復患投下藥不得與傷寒初受病人一法治之也病人若因飲食所勞傷復至第二三日兩手脈沈實有力或寸脈力大於關尺脈或胷已上濈然汗出者當急下之宜大承氣湯如一服下利未快即再作調胃承氣湯服之並用仲景方病人勞復三四日以後兩手脈沈數大有力或發熱煩躁咽乾而渇或面塵齒垢或目中及遍身皆發黄者宜丹砂丸主之丹砂丸丹砂水飛過馬牙硝各半兩砂石一兩麥門冬去心犀角各三錢金箔方寸許三十片牛黄一錢右合研匀用濕紙裹爛粳米飯於溏火内燒紙乾為度和前藥丸如彈子大每服一丸砂糖水化下如黄甚者煎茅根湯放冷入砂糖一塊如棗大同化下如黄未退來日再服之病人用承氣湯下之後至四五日兩手脈沈數有力或潮熱或譫語者更宜下之或再投承氣湯又謂胃中若不甚實宜用丹砂散下之丹砂散丹砂一粒膩粉一錢氣弱年老人減半右合研匀用桃栁心共一把許細切研爛紐取自然汁入砂糖一塊如棗大更入新汲水通前成半盞化前藥下之如經一晝夜不利動再作服之此藥奇妙不得與尋常下藥為比也如冬月無桃枝栁條用生地黄一兩剉碎水一升煎取半升化藥服凡中諸藥毒者用新銅錢一個口内含之一二時辰許如錢色黑是中毒驗也用丹砂一粒膩粉一錢砂糖一塊如棗大同研匀以藍葉取自然汁化下日一服重者不過三服當下血如豚肝也如無藍葉汁只用藍葉末三錢匕入在藥内以東流河水同調下凡小兒陽癎潮搐涎盛及角弓反張者量大小每用丹砂丸一粒分作三服只用砂糖水化下如要利動每服入膩粉量少許同化下此藥極有神效今特錄示諸病于此者恐醫流悮治傷寒汗下畜血黄病及勞復也傷寒微㫖論卷下
