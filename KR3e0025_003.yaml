body:
  text: 後序愚閒覽賈祐輩治傷寒病之說未嘗不廢卷而嘆焉其間全不明脈之寸尺有陰陽虚盛之端證有淺深分温觧汗下之趣深昧嵗中之氣候不分藥力之輕重而醫者家𫝊執為良法若病人逆從遇治即陷横殃此去仲景之意亦已逺矣因兹别撰成傷寒㣲㫖論二卷共二萬餘言以文理疎畧意識淺昧雖不足助知者之觀但竊通其俗用耳但今之醫流十中八九為俗人所主也其先進名醫勿為輕笑葢向趣不同後進好學者幸少留心庶病無壞證其間雖有誤改仲景傷寒論内一二法非敢好異固欲更張但少明其𫝊寫謬妄爾韓祗和再序
