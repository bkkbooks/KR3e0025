body:
  text: 提要傷寒微旨論二卷醫家類臣等謹案傷寒微旨二卷宋韓祇和撰是書宋史藝文志不載陳振孫書録解題載有其名亦不著作者名氏但據序題元祐丙寅知其為哲宗時人而已今檢永樂大典各卷內此書散見頗多每條悉標韓祇和之名而元戴良九靈山房集亦稱自漢張機著傷寒論晉王叔和宋成無已龎安常朱肱許叔微韓祇和王賓之流皆互有闡發其間祇和姓名與永樂大典相合是祇和實北宋名醫以傷寒為專門者特宋史方技傳不載其履貫遂不可考耳書凡十五篇間附方論大抵皆推闡張機之旨而能變通於其間其可下篇不立湯液惟以早下為大戒蓋為氣質羸弱者言然當以脈證相參知其邪入陽明與否以分汗下不宜矯枉過直竟廢古方至如辨脈篇據傷寒例桂枝下咽陽盛乃斃承氣入胃隂盛乃亡之義以攻楊氏之謬誤可汗篇分隂盛陽虛陽盛隂虛隂陽俱盛三門則俱能師張氏而神明其意矣又如汗下溫三法分按時候辰刻而參之脈理病情乃因張機正傷寒之法而通之於春夏傷寒更通之於冬月傷寒亦頗能察微知著又如以陽黃歸之過下亡津則於金匱發陽發隂之論研析精微不特傷寒之黃切中窽要即雜病之黃亦可以例推矣其書向惟王好古隂證略例中間引其文而原本久佚今採掇薈稡復成完帙謹依原目釐為上下二卷陳振孫所稱之原序則永樂大典不載無從採補殆編纂之時舊本已闕歟乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書傷寒微旨論目録卷上傷寒源篇傷寒平脈篇辨脈篇陰陽盛虛篇治病隨證加減藥篇用藥逆篇可汗篇可下篇卷下總汗下篇辨汗下藥力輕重篇溫中篇小便大便篇畜血證篇隂黃證篇勞復證篇
