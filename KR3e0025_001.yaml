body:
  text: 傷寒微旨論卷上宋韓祗和撰傷寒源篇夫傷寒之病醫者多不審察病之本源但只云病傷寒即不知其始陽氣內鬱結而後成熱病矣自冬至之後一陽漸生陽氣微弱猶未能上行易潛龍勿用是也至小寒之後立春以前寒毒殺厲之氣大行時中於人則傳在藏府其內伏之陽被寒毒所折深浹於骨髓之間應時不得宣暢所感寒氣淺者至春之時伏陽早得發泄則其病輕名曰溫病感寒氣重者至夏至之後真陰漸發其伏陽不得停留或遇風寒或因飲食沐浴所傷其骨髓間鬱結者陽氣為外邪所引方得發泄伏陽既出肌膚而遇天氣炎熱兩熱相干即病證多變名曰熱病按素問生氣通天論云冬傷於寒注云冬寒且凝春陽氣發寒不為釋陽怫于中寒怫相持故病溫熱論云人之傷於寒也則病熱注云寒毒薄於肌膚陽氣不得散發而內怫結故傷寒者反為熱病也以此證之即傷寒之病本於內伏之陽為患也傷寒受足經篇云人身有十二經絡分布上下故手有三陽三陰足有三陽三隂手三陽者太陽小腸也陽明大腸也少陽三焦也三隂者太陰肺也少陰心也厥陰心包絡也足三陽者太陽膀胱也陽明胃也少陽膽也三陰者太陰脾也少陰腎也厥陰肝也今傷寒之為病只受於三陽三陰者何也熱論云一日巨陽受之頭項痛腰脊強二日陽明受之陽明主肉故身熱目疼而鼻乾不得卧三日少陽受之少陽主膽故胸脅痛而耳聾四日太陰受之故腹滿而咽乾五日少陰受之故口燥舌乾而渴六日厥陰受之故煩滿囊縮今經中論其傷寒病所傳受而不傳于手之三陽三陰古今未見其説焉且人之生也稟天地陰陽氣身半以上同天之陽身半以下同地之陰或四時有不常之氣陽邪為病則傷于手經也陰邪為病則傷于足經也故冬毒之氣則中於足經矣易云水流濕火就燥是也太陰陽明論陽受風氣陰受溼氣注云同氣相求爾又曰傷於風者上先受之傷於溼者下先受之注云陽氣炎上故受風陰氣潤下故受溼蓋同氣相合爾至真要大論云身半以上其氣三天之分也天氣主之身半以下其氣三地之分也地氣主之注云當陰之分冷病歸之當陽之分熱病歸之脈要精微論云故中惡風陽氣受之也以此為證即寒毒之氣只受於足之三陽三陰明矣傷寒平脈法夫傷寒既稟于冬得春夏之氣則欲發泄而又因飲冷嗜欲則觸起因衝風雨則迫動因他人病所著則外邪喣出內邪既病之後變動不常未見于證先形于脈脈者人之權衡浮數而軟命之曰傷風浮數而硬命之曰傷寒傷寒之脈陽毒則頭大尾小陰毒則頭小尾大頭者寸也尾者尺也寸有餘則為陽毒尺有餘則為陰毒三部皆有餘乍大乍小為往來未定陽毒盛則解陰毒盛則溫陰陽皆盛則平陰陽皆弱則扶陰陽未定則待既久不定然後觀證治傷寒以脈為先以證為後浮者按之便得數者一息六至以上硬者有力凡有吐瀉當以脈候關前脈大關後脈小或六脈俱大雖吐瀉大熱之證不得便以為熱關前脈小關後脈大或六脈俱微雖祕結大寒之證不可便以為寒經云關前為陽關後為陰辨脈篇夫辨傷寒病之脈不出于數種曰浮曰沈曰數曰遲曰陰曰陽先識此等六脈然後辨盛虛審大小察緊緩為治病之急務今之醫流治傷寒病只憑脈浮為陽脈沈為陰全不明脈尺寸有陰陽虛盛之理為可汗下與不可汗下之規往往變傷寒為壞病焉浮脈者非謂舉之有餘及按之三四菽重得之也脈有三部有上部有中部有下部凡脈在上部者皆名浮也于傷寒病即不然但病人兩手脈見之于皮外指到不及按便得者乃是浮也若病在表脈浮不得便以浮為陽浮中亦有陽亦有陰也蓋三隂病在表脈亦浮也故有可汗者有不可汗者沈脈者非謂深取而得之也若在中部上見即為沈矣但兩手脈按之至皮下得者乃是沈也傷寒病在裏三部脈沈不得便以沈脈為陰沈中亦有陽亦有陰也假令三陽病在裏脈亦沈也故有可下者有不可下者數脈者一息六七至是也病人脈或浮或沈若陰陽氣停脈雖及六七至只是邪氣傳受不宜妄投藥也若脈及七至已上按之有力即可投藥解之此陰氣弱陽氣勝也遲脈者一息四至下三至上是也病人脈或浮或沈不以大小緩急但見脈遲便可投藥和之此是陽氣弱陰氣勝也前數脈不投藥者蓋數脈與陽病相應何藥之有今遲脈投藥者乃是遏陰氣而歸于陽也陽脈者非謂脈浮為陽也病人兩手脈或浮或沈皆以寸口為陽也若以在表為陽古人何以不云病在陽而云病在表也平人氣象論曰寸者陽分位也脈經曰從關至魚際是寸口內陽之所治也又曰關前為陽也陰脈者非謂脈沈為陰也病人兩手脈或浮或沈皆以尺中為陰也若以在裏為陰古人何以不云病在陰而云病在裏也平人氣象論曰尺者陰分位也脈經曰從關至尺是尺內陰之所治也又曰關後為陰也盛脈者非謂牢實洪滑也是陰陽氣偏勝之名也病人脈或浮或沈不以大小緩緊若寸口力大名曰陽盛尺中力大名曰陰盛也虛脈者非謂軟微濡弱也是陰陽氣不足之名也病人脈或浮或沈不以大小緩緊若寸口力小名曰陽虛尺中力小名曰陰虛也大脈者按之指下似洪而極大也病人脈三部力停或在表或在裏按之雖大若不發熱冒悶及口燥咽乾譫語者此是無表裏證不可妄治之治之即邪毒相攻為壞病矣細脈者比常脈小也非微細之細也若病人兩手三部脈力停或在表或在裏其脈按之小或無力雖陰脈先見而證未見便可少投溫藥和之何者蓋欲消陰氣歸于陽也緊脈者寒也按之指下如繩動而無常是也病人三部脈停或浮而緊表傷寒也或沈而緊胃中寒也若不惡寒不自汗不胸滿不腹痛勿妄治之此是傷于寒氣而傳受也緩脈者風也按之指下軟差駃疾于遲是也病人三部脈力停或浮而緩表傷風也或沈而緩亦胃中寒也若不惡風不自汗不嘔逆不腹滿亦勿妄治之亦是傷于風而傳受也前辨脈之法乃是病人始得病三四日以前未經服汗下吐藥即依前脈調理免成壞病若病人服汗下吐藥太過變見别脈及有壞病證悉具仲景傷寒之論也陰陽盛虛篇凡治傷寒病先辨脈之浮沈次于浮沈中察寸尺之虛盛何謂虛盛病人兩手三部脈或浮或沈關前寸脈小關後尺脈大曰陽虛陰盛關前寸脈大關後尺脈小曰陽盛陰虛今之醫者則不然皆云脈浮為陽豈可更言陰脈沈為陰豈可更言陽執此偏見枉陷病人至于不救難經云五十八難曰傷寒有汗出而愈下之而死者有汗出而死下之而愈者何也夫陽虛陰盛汗出而愈下之即死陽盛陰虛汗出而死下之即愈楊氏曰此説反倒于義不通不可依用若反此行之大為順耳楊氏即據脈經辨脈陰陽大法云脈有陽盛陰虛陰盛陽虛何謂也曰浮之損小沈之實大故曰陰盛陽虛沈之損小浮之實大故曰陽盛隂虛是陰陽虛實之意也注云陽脈見寸口浮而實大今輕手浮之更損減而小故言陽虛重手按之反更實大而沈故言陰實也楊氏曲執此二端為治傷寒病汗下之法况脈經中立此辨脈陰陽大法蓋總言雜病脈浮之損小沈之實大沈之損小浮之實大為陰陽虛盛之説非為傷寒病立言也傷寒病脈浮當以關前為陽關後為陰脈沈亦以關前為陽關後為陰也假令三部脈浮有可汗者有不可汗者若寸脈短小尺脈實大名曰隂盛陽虛乃可汗之汗之即愈若寸脈實大尺脈短小名曰陽盛陰虛不可汗之汗之即死三部脈沈有可下者有不可下者若寸脈實大尺脈短小名曰陽盛陰虛乃可下之下之即愈若寸脈短小尺脈實大亦曰陰盛陽虛不可下之下之即死今楊氏執難經正文為汗下之誤及言文意反倒不可依用由其不通難經中陰陽二字乃是三部脈浮沈中寸為陽尺為陰非謂三部脈浮為陽沈為陰也使後人妄憑注中之説誤投汗下藥以害人命皆楊氏為萬世之罪魁也蓋楊氏殊不達聖賢之意自擅已能謬傳于世故也且仲景傷寒例曰桂枝下咽陽盛則斃承氣入胃陰盛乃亡假令脈浮為陽合投桂枝湯仲景何言陽盛則斃蓋謂三部脈浮寸脈力大關尺脈力小為陽盛若投桂枝湯足以助陽為毒是病人必死矣假令脈沈為陰合投承氣湯仲景何言陰盛則亡蓋謂三部脈沈寸脈力小關尺脈力大為隂盛若投承氣湯足以助隂為毒是病人必亡矣此仲景汗下之戒正與難經陰陽虛盛文意同也則楊氏之失明矣病在表脈浮寸脈力小于關尺此為陽虛陰盛雖三日以後至四五日亦可投發表藥若寸脈力大于關尺此為陽盛陰虛雖未滿三日亦不可投發表藥投之則助陽為逆病人三日以後病猶在表脈浮三部齊等尚不可投汗藥况寸脈力大于關尺耶病在裏脈沈寸脈力大于關尺此為陽盛陰虛雖四日後亦可下之若四日以前雖有此脈未投下藥亦不為晚若寸脈力小于關尺此為陽虛陰盛雖四日至六七日以後亦不可投下藥下之則助陰為逆病人四五日以後病傳在裏脈沈三部等齊尚不可投下藥况寸脈力小于關尺耶治病隨證加減藥篇夫病證變壞急速者無出於傷寒古人以傷寒為卒病也古今治傷寒無出於仲景方仲景尚隨證加減藥味量病而投之傷寒論辨太陽證小青龍湯方內若渴去半夏加􅌝􅌣根若微利小便不利少腹滿去麻黃加茯苓若喘去麻黃加杏仁又傷寒五六日中風往來寒熱者小柴胡湯方內若胸中煩而不嘔去半夏人參加􅌝􅌣根若腹中痛去黃芩加芍藥脅下硬去棗加牡礪若心下悸小便不利去黃芩加茯苓若不渴外有微熱者去人參加桂枝若咳去人參薑棗加五味子乾薑又傷寒八九日風溼相搏桂枝附子湯方內若其人大便鞕小便自利去桂枝加术少許又少陰傷寒病二三日不已真武湯方內若咳加五味細辛乾薑若小便利去茯苓若下利去芍藥加乾薑若嘔去附子加生薑又霍亂理中圓方內若臍上築者腎氣動也去术加桂吐多去术加生薑下利多還用术悸者加茯苓渴欲得水者加术腹中痛加人參寒者加乾薑腹滿去术加附子今據此五方中加減藥味之法乃是前賢訓誨人之深意也今之醫者見古方中有加減意即依方用之若方中無加減意不能更張毫釐所謂膠柱也况素問有異法方宜論豈是執一端而治病也假令雜病方可用治傷寒病者亦可投之豈須待傷寒論中有法也况古人之心文筆不能盡言者多矣用藥逆篇病人若因服下藥太過兩手脈沈細數肢體逆冷煩躁而渴者乃是陽氣下陷入丹田陰氣厥逆滿上二焦故令人躁此名隂躁也醫者見病人煩躁又不詢其端由亦不詳其脈理便用涼藥治之涼藥既下病勢愈甚至於困極不救者多矣病人若因下之太早兩手脈沈遲細而無力或遍身及四肢逆冷煩躁而渴者或引飲不休好泥水中卧者須用性熱藥治之凡投性熱藥皆須冷服何故如是蓋為病人腹中陰氣太盛若投熱藥湯劑則陰陽氣相擊藥下必便吐出須候湯劑極冷即投之投之不吐者以腹中隂氣與冷飲相逢即同氣相求爾故藥下不吐也藥雖冷飲久即必發熱矣所謂始同而終異也素問云醇酒冷飲久必發熱是也假令投仲景四逆湯之類一依前説若病人不煩躁即熱藥可溫服之病人若傷暑熱胃中空虛飲冷太過遂成泄利日二三十往大便色黃米穀不化渴飲水漿醫者見此證云脾胃不和故至此也投熱藥或止之或補之熱藥既下往往吐出及下利愈甚此亦陰陽氣相擊也若處承氣湯之類令病人熱飲之藥既得下必不吐出亦是與胃中熱氣相從也熱力既消藥冷性得行其病即愈素問注云以蔥薑和粉藿投之是也可汗篇傷寒病有可汗者論中但統言其可汗證及可汗脈或云脈浮弱或云脈浮而數或云脈浮緊或云脈浮無汗而喘或云脈浮而在表今略舉數條後人但憑脈之大槩並不分脈浮有陰陽虛盛之理又不分有可汗有不可汗之處誤投發表藥服之則多變成陽毒之患今舉病人有汗惡風無汗發熱分為三等及據立春以後立秋以前氣候輕重各立方治之庶學者易為開悟耳病人一二日以前兩手脈浮數或緩或緊按之差軟寸關尺若齊等雖有頭痛身熱但只是邪氣傳于陽分不可妄投發表藥也病人雖頭痛惡風身熱若兩手脈寸關尺三部齊等其力不甚大不甚小者亦未可便與解表藥此是見表證未見表脈也直候寸脈力小于關尺方可投解表藥大抵治傷寒病見證不見脈未可投藥見脈不見證雖少投藥亦無害也凡治雜病以色為先以脈為後治傷寒以脈為先以證為後病人兩手脈浮數而緊名曰傷寒若關前脈力小關後脈力大惡風不自汗此乃陰氣已盛先見于脈也若不調藥和之後必惡風及自汗出若立春以後至清明以前宜調脈湯主之清明以後至芒種以前宜葛根柴胡湯主之芒種以後至立秋以前冝人參桔梗湯主之調脈湯葛根一兩防風去蘆半兩前胡去苗三錢甘草炙半兩右為末每服二錢水一盞生薑一塊如棗大劈破煎至七分去滓溫服如寸脈依前力小加棗三個劈破同煎葛根柴胡湯葛根一兩半柴胡一兩芍藥二分桔梗三分甘草三分炙右為末每服二錢水一盞生薑三片煎七分去滓熱服如寸脈依前力小加蔥白三寸同煎服之人參桔梗湯人參桔梗各三分麻黃去節一兩石膏三兩甘草三分炙右為末每服二錢水一盞荆芥五穗煎至七分去滓熱服如尺脈依前力小可麻黃二分去節同煎服病人兩手脈浮數而緩名曰中風若寸脈力小尺脈力大惡風不自汗此亦陰氣已盛先見于脈也若不調藥和之後必惡風自汗出若立春以後至清明以前宜薄荷湯主之清明以後至芒種以前宜防風湯主之芒種以後立秋以前宜香芎湯主之薄荷湯薄荷一兩葛根半兩人參三分甘草炙半兩防風去蘆半兩右為末每服三錢水一盞煎至七分去滓熱服如三五服寸脈力尚小加薄荷二分防風湯防風去蘆半兩桔梗三分甘草炙旋覆花各半兩厚朴炒三分右為末每服三錢水一盞入薑一塊如棗大劈破煎至七分去滓熱服如三五服寸脈力尚小加荆芥穗五七枚同煎香芎湯川芎一分石膏二兩升麻三分甘草半兩厚朴半兩右為末每服三錢水一盞煎至七分去滓溫服如三五服後寸脈力尚小加細辛二分前二段又將中風傷寒各立法者何蓋為病人始病三日已前因中風脈緩或因傷寒脈緊脈雖先見而病證猶未見尚可用藥解之故各立方爾病人兩手脈浮數或緊或緩寸脈短及力小于關尺脈者此名陰盛陽虛也若自汗出惡風者是邪氣在表陰氣獨有餘也素問云陰氣有餘而多汗身寒是也即可投消陰助陽發表藥治之若立春以後至清明以前宜六物麻黃湯主之清明以後至芒種以前宜七物柴胡湯主之芒種以後至立秋以前宜發表湯主之六物麻黃湯麻黃去節一兩人參甘草各半兩葛根蒼术各三分右為末每服三錢水一盞棗二個煎至七分去滓熱服如三五服後汗未止加荆芥三分如三五服後不怯風猶自汗出加舶上丁香皮半兩七物柴胡湯柴胡二兩蒼术荆芥穗甘草麻黃去節各一兩右為末每服三錢水一盞入薑一塊如棗大劈碎棗三箇劈破同煎七分去滓熱服三五服後汗未止者猶惡風者加蔥白三寸如三五服汗猶未止加當歸一兩同煎服發表湯麻黃去節兩半蒼术三分人參當歸各半兩去蘆舶上丁香皮甘草各三分右為末每服三錢水一盞生薑一塊如棗大劈破棗三箇同煎至七分去滓熱服如三五服後汗未止猶怯風者加桂枝三分如汗未止更加細辛半兩以汗止為度病人脈浮數或緊或緩其脈上出魚際寸脈力大于關尺此名陽盛陰虛若發熱冒悶口燥咽乾者乃是邪氣在表陽氣獨有餘也素問云陽氣有餘而身熱無汗是也可投消陽助陰藥以解表若立春以後至清明以前宜人參湯主之清明以後至芒種以前宜前胡湯主之芒種以後至立秋以前宜石膏湯主之人參湯人參半兩石膏二兩柴胡一兩芍藥甘草各三分右為末每服三錢水一盞薑三片如錢大同煎至七分去滓熱服如三五服後依前發熱者每服水盞半加豆䜴十五粒同煎至八分如前熱未解更加石膏二兩前胡湯前胡一兩石膏二兩豆䜴熬焦三分桔梗三分甘草半兩右為末每服三錢水一盞薑一塊如棗大劈破同煎至七分去滓熱服依前熱未解每服入豆豉三十粒水盞半同煎至八分去滓熱服石膏湯石膏三兩芍藥柴胡各一兩升麻黃芩甘草各三分右為末每服三錢水盞半入䜴一合煎八分去滓熱服如三五服後熱不解加知母一兩如熱未解加大青一兩病人兩手脈浮數或緊或緩三部俱有力無汗惡風者此是陰陽俱有餘素問云陰陽有餘則無汗而寒是也可用藥平之若立春以後至清明以前宜解肌湯主之清明以後至芒種以前宜芍藥湯主之芒種以後至立秋以前宜知母湯主之解肌湯芍藥二兩麻黃去節三分升麻甘草炙各半兩右為末每服三錢水一盞半入豉半合煎至八分去滓熱服如三五服後猶惡風者加麻黃半兩石膏一兩芍藥湯芍藥荆芥穗各一兩石膏三兩甘草炙各半兩右為末每服三錢水一盞薑一塊劈破同煎至七分去滓熱服如三五服後猶惡風再加薑一塊棗三箇煎法如前知母湯知母麻黃去節升麻各一兩石膏二兩甘草一兩半右為末每服三錢水一盞入薑一小塊同煎八分去滓熱服如三五服後猶惡風者加麻黃半兩仲景云傷寒為病脈緩者名中風脈緊者為傷寒蓋始因經冬溫毒毒氣中其人內伏之陽沈潛于骨髓之內每至春夏發時或因外傷寒而引內邪出及乎內邪既出即為病一也故古人立此二端恐後人疑其緊脈與緩脈治法别也若中風與傷寒脈異何故仲景無别法治之此乃後人不究仲景之心也前三段又將中風與傷寒一法治之者何蓋病人始得病後脈與證俱見若投解利藥必不能愈故立前方同法治之病人始得病一二日至五六日尚有表脈及表證者亦可依脈證投藥凡投解表及發表藥每一日可飲三服病甚者可至五服外不可頻投藥也如證未解可投熱粥內加蔥白亦佳如有汗出勿厚衣蓋覆恐出汗太過作亡陽證可下篇傷寒病有可下者論中但統言其可下證及可下脈或云下利三部脈皆平心下硬或云下利脈遲而滑者內實或云脈滑而數者有宿食或云脈沈者內實或云脈滑內疾或云脈浮大按之反澀有宿食或云脈實者今略舉此數説後人但憑其脈之大綱即不分脈沈有隂陽虛盛之理又不分有可下有不可下之處悮投下藥終必變成四肢逆冷手足拘攣嘔逆喘滿之患病人四五日以後兩手脈沈數按之不甚實若三部力齊等雖有發熱冒悶只是邪氣傳于內潛在胃脘不可妄投下藥也若投黃芩湯三服以解之即可病人五六日兩手三部脈沈數大按之不斷寸脈上湧力大于關尺脈此名陽盛陰虛可大小承氣湯以助陰消陽也若腰重口乾譫語項背以上濈然汗出時時潮熱者可服調胃承氣湯若第四五日見此證脈可服小承氣湯病人三四日以後兩手三部脈沈數寸脈斷力小關尺脈力大此名隂盛陽虛切不可投下藥宜據溫中篇內湯丸投之以助陽消隂也病人兩手三部脈沉數按之至骨有力而不斷口燥咽乾而渴時時發熱冒悶者此是隂陽氣俱實可用藥和之宜黃芩湯主之黃芩湯黃芩甘草山梔子芍藥厚朴英粉等分右為末每服二錢水一盞煎至七分去滓溫服如脈力差軟住服若大便溏去梔子加葛根等分若立春以後立夏以前見證者去梔子芍藥加柴胡去苖等分病人兩手脈沈數大按之不斷寸脈上湧力大于關尺者此名陽盛隂虛可投藥下之以助陰消陽也若立春以後至清明以前可下者小承氣湯內更加厚朴半兩減大黃一兩主之若發熱譫語引飲者小承氣湯清明以後芒種以前可下者小承氣湯主之若發熱冒悶腰重引飲時時譫語大承氣湯芒種以後至立秋以前可下者大承氣湯主之若發熱煩躁腰重譫語頭面濈然有汗者調胃承氣湯主之凡用大小承氣及調胃承氣並用仲景方病人立春以後至芒種以前第三四日雖有可下證及有可下脈亦未可便投下藥直候至第五日或第六日投下藥者何蓋天氣陽力尚微慮下之太過變成壞病也若芒種以後立秋以前雖第二三日有可下證及有可下脈亦未可便下之直候至第四五日下之天氣炎盛與胃中熱氣相干故第四五日投下必不能成後患也凡投下藥不得務急為勝假令今日寅時投下藥至申時酉時不動可再投下藥假令今日酉戌時投下藥至來日雞鳴時不動可再投下藥切宜慎守也病人三四日以前切不宜早下之則多成結胸及四逆之患至十二日以後者見有下證雖脈不至實盛亦冝下之假令第十二三日投下藥之後至十六七日尚口燥咽乾譫語者即更宜下之何者蓋為隂病不過六七日乃劇若陽病至十三日以後頻投下藥無害也今立此言者恐醫流將病人日數淺深一槩治也且今太平久矣藏府柔脆故氣血虛弱但遲投下藥亦無害耳病人四五日以後假令今日寅時見下證及有可下脈未可便投下藥更候至午未時間陽氣盛再看其脈若比寅時寸脈力倍大于關尺脈即可下之若與寅時脈力平同即候次日投下藥亦不為晚矣凡投下藥者量其脈力輕重證之深淺不可下之太過若太過則病證多變且古人立理無失下之過但罪其下之太早及太過爾况病人七八日不大便古人未嘗罪醫者投下藥之晚此醫之深意思後人全不通曉病人第五六日兩手三部脈沈數寸關尺力齊等者此乃陰陽氣停雖然咽乾腰重發熱亦不可投下藥當大便自下爾病人至六七日不大便若其兩手寸脈小尺中脈大亦不可下之雖不服下藥而大便者則必先硬而後溏蓋由腹中有陰氣也仲景論曰先硬後軟不可攻也况鴨溏乎傷寒論中或云按之心下堅腹中滿不大便口燥咽乾汗出譫語日晡所發潮熱不能食體重氣促濈然汗出皆是可下之證雖有此可下證若三部脈停力弱及寸脈小于關尺此為有下證無下脈不可下之毫釐千里直候寸脈力大于關尺可下也凡投下藥只參酌仲景承氣湯輕重用之治傷寒病投下藥者本不為取積及取食止為疏解陽毒之氣若邪毒在內陽氣盛即寸脈大乃可下之其陽氣不盛即三部脈停何必下之蓋今人只知沈在裏便投下藥殊不較量脈之陰陽虗盛也凡投下藥者本因胃中有邪熱之氣故投大黃芒硝之類以消陽氣今之醫者絶不解古人下傷寒之法多投以丸藥丸藥多用巴豆水銀膩粉粉霜砒霜甘遂石腦油之類皆是熱藥但能逐其胃中濁惡即愈增其邪熱矣今用丸藥下傷寒病者欲去胃中積聚胃氣既虛即邪熱在內又與熱相逢及吐納暑熱之氣足以助陽為毒後成壞病也今人投下藥才見大便利及三五次急投和氣藥以補之本意用大黃等涼藥疏導胃中熱氣熱氣才過乘虛之際却投和氣補藥決然變成發黃斑出衄血畜血狂走之患矣凡投下藥候四五日以後有下脈及有可下證即可下之假令病人不投下藥至六七日大汗後依然腰痛咽乾而渴日晡發熱頰赤胸中冒悶兩手脈實而數宜用黃芩湯一兩服和之直候大汗出後至第五六日投大承氣湯或調胃承氣湯亦無害蓋于汗後至第五六日投下藥者是因病人大病後氣血虛弱不可早下也前可汗篇别立方藥而不從仲景方今可下篇中不别立藥而從仲景方者何蓋太平之人飲食動作過妄而陽氣多若用大熱藥發表則必變成壞病故參酌力輕而立方也世人陽氣既多若用下藥當從至陰藥投之非仲景承氣湯之類即别藥不能對病矣請醫者深詳之傷寒微旨論卷上
